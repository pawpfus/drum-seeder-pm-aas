<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d3327"/>
      <stop offset="1" stop-color="#061a13"/>
    </linearGradient>
    <linearGradient id="drum" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4fd487"/>
      <stop offset="1" stop-color="#1f8a4f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- poros -->
  <rect x="96" y="246" width="320" height="20" rx="10" fill="#2f7fe0"/>
  <!-- roda kiri -->
  <g transform="translate(150,256)">
    <circle r="70" fill="#222"/>
    <circle r="46" fill="none" stroke="#8b8f96" stroke-width="10"/>
    <circle r="14" fill="#c9ccd2"/>
    <g fill="#111">
      <!-- gerigi -->
      <g id="lug"><rect x="-9" y="-80" width="18" height="18" rx="3"/></g>
      <use href="#lug" transform="rotate(45)"/><use href="#lug" transform="rotate(90)"/>
      <use href="#lug" transform="rotate(135)"/><use href="#lug" transform="rotate(180)"/>
      <use href="#lug" transform="rotate(225)"/><use href="#lug" transform="rotate(270)"/>
      <use href="#lug" transform="rotate(315)"/>
    </g>
  </g>
  <!-- tabung PVC -->
  <g transform="translate(300,256)">
    <rect x="-40" y="-46" width="176" height="92" rx="18" fill="url(#drum)"/>
    <rect x="-58" y="-40" width="22" height="80" rx="8" fill="#6b7280"/>
    <rect x="136" y="-40" width="22" height="80" rx="8" fill="#6b7280"/>
    <rect x="20" y="-60" width="56" height="20" rx="6" fill="#1e56b0"/>
    <g fill="#0e2a1c">
      <circle cx="0" cy="-8" r="6"/><circle cx="24" cy="-8" r="6"/><circle cx="48" cy="-8" r="6"/><circle cx="72" cy="-8" r="6"/><circle cx="96" cy="-8" r="6"/>
      <circle cx="0" cy="16" r="6"/><circle cx="24" cy="16" r="6"/><circle cx="48" cy="16" r="6"/><circle cx="72" cy="16" r="6"/><circle cx="96" cy="16" r="6"/>
    </g>
